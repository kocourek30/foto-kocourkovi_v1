services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_dumps:/db_dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8880 --workers 3 --timeout 120
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "127.0.0.1:8002:8880"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
