services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foto_kocourkovi}
      POSTGRES_USER: ${POSTGRES_USER:-foto_kocourkovi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foto_kocourkovi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foto_kocourkovi} -d ${POSTGRES_DB:-foto_kocourkovi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8880
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8880:8880"
    depends_on:
      - db

volumes:
  postgres_data:
