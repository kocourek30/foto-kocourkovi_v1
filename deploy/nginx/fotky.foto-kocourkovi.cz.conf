server {
    listen 80;
    server_name fotky.foto-kocourkovi.cz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fotky.foto-kocourkovi.cz;

    ssl_certificate /etc/ssl/certs/fotky.foto-kocourkovi.cz.pem;
    ssl_certificate_key /etc/ssl/private/fotky.foto-kocourkovi.cz.key;

    client_max_body_size 50m;

    location /static/ {
        alias /srv/foto-kocourkovi_v1/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/foto-kocourkovi_v1/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
